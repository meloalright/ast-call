name: "Showcase: Python"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  showcase-python:
    name: Run who-ast on Python samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Index sample project
        run: |
          cd samples/python-project
          ../../target/release/whocall index .
          echo ""
          echo "=== metadata ==="
          cat .who-ast/metadata.json

      - name: "Demo: whocall (human)"
        run: |
          cd samples/python-project
          echo "$ whocall render_text"
          ../../target/release/whocall render_text || true

      - name: "Demo: whocall (JSON)"
        run: |
          cd samples/python-project
          echo "$ whocall render_text --json"
          ../../target/release/whocall render_text --json || true

      - name: "Demo: whocall class method"
        run: |
          cd samples/python-project
          echo "$ whocall src/models.py:6"
          ../../target/release/whocall src/models.py:6 || true

      - name: "Demo: whocall format_output"
        run: |
          cd samples/python-project
          echo "$ whocall format_output --json"
          ../../target/release/whocall format_output --json || true
